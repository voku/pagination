name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '7.1'
          - '7.2'
          - '7.3'
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tools: composer:v2

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: composer test

      - name: Run PHPStan
        if: matrix.php == '8.5'
        run: composer phpstan -- --no-progress
